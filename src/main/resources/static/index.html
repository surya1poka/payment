<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Payment Simulator</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }
        .box {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input, select, button {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button {
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>💳 Payment Simulator</h2>

    <input type="number" id="amount" placeholder="Enter Amount">

    <select id="method">
        <option value="upi">UPI</option>
        <option value="card">Card</option>
        <option value="netbanking">Net Banking</option>
        <option value="cod">Cash on Delivery</option>
    </select>

    <button onclick="pay()">Pay Now</button>

    <h3 id="result"></h3>
</div>

<script>
function pay() {
    let amount = document.getElementById("amount").value;
    let method = document.getElementById("method").value;

    fetch(`http://localhost:8082/pay?method=${method}&amount=${amount}`, {
        method: "POST"
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("result").innerText = data;
    });
}
</script>

</body>
</html>
